<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solvinter</title>
  <meta name="description" content="Solvinter" />
  <style>
    :root {
      --night: #030611;
      --deep: #0b1530;
      --text: #edf3ff;
      --star-core: #fff9e8;
      --star-edge: #ffd36a;
      --halo-blue: rgba(122, 170, 255, 0.22);
      --halo-gold: rgba(255, 219, 143, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 44%, var(--halo-blue) 0%, transparent 18%),
        radial-gradient(circle at 50% 46%, var(--halo-gold) 0%, transparent 12%),
        radial-gradient(circle at 50% 50%, var(--deep) 0%, var(--night) 72%);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-repeat: no-repeat;
      animation: twinkle 9s ease-in-out infinite alternate;
    }

    body::before {
      background-image:
        radial-gradient(1px 1px at 16% 22%, rgba(255, 255, 255, 0.95), transparent),
        radial-gradient(1px 1px at 24% 76%, rgba(255, 255, 255, 0.7), transparent),
        radial-gradient(1px 1px at 72% 18%, rgba(255, 255, 255, 0.8), transparent),
        radial-gradient(1px 1px at 82% 68%, rgba(255, 255, 255, 0.7), transparent),
        radial-gradient(1px 1px at 62% 84%, rgba(255, 255, 255, 0.6), transparent);
      opacity: 0.75;
    }

    body::after {
      background-image:
        radial-gradient(1px 1px at 10% 58%, rgba(255, 255, 255, 0.55), transparent),
        radial-gradient(1px 1px at 38% 14%, rgba(255, 255, 255, 0.5), transparent),
        radial-gradient(1px 1px at 88% 34%, rgba(255, 255, 255, 0.55), transparent),
        radial-gradient(1px 1px at 68% 76%, rgba(255, 255, 255, 0.45), transparent);
      opacity: 0.45;
      animation-delay: 3s;
    }

    main {
      position: relative;
      z-index: 1;
      display: grid;
      justify-items: center;
      gap: 1.75rem;
      padding: 2rem;
      text-align: center;
      animation: rise 1.8s ease-out both;
    }

    .starfield {
      position: relative;
      width: min(34vw, 13rem);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    .halo {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background:
        radial-gradient(circle, rgba(130, 176, 255, 0.32) 0%, rgba(130, 176, 255, 0.1) 34%, transparent 70%);
      filter: blur(14px);
      animation: breathe 7s ease-in-out infinite;
    }

    .star {
      position: relative;
      width: 0.95rem;
      height: 0.95rem;
      border-radius: 999px;
      background: radial-gradient(circle, var(--star-core) 0%, var(--star-edge) 100%);
      box-shadow:
        0 0 18px rgba(255, 230, 160, 0.95),
        0 0 44px rgba(255, 217, 122, 0.6),
        0 0 88px rgba(126, 175, 255, 0.34);
      animation: glimmer 6s ease-in-out infinite;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.7rem, 7vw, 5rem);
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-indent: 0.28em;
      text-shadow: 0 0 24px rgba(160, 196, 255, 0.25);
    }

    .portal {
  display: flex;
  gap: 2rem;
  margin-top: 1rem;
}

.portal a {
  color: rgba(237,243,255,.72);
  text-decoration: none;
  font-size: .95rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  transition: color .3s ease, text-shadow .3s ease;
}

.portal a:hover {
  color: #fff;
  text-shadow: 0 0 12px rgba(255,220,120,.6);
}

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes twinkle {
      0% {
        opacity: 0.35;
      }
      50% {
        opacity: 0.8;
      }
      100% {
        opacity: 0.45;
      }
    }

    @keyframes breathe {
      0%,
      100% {
        transform: scale(0.96);
        opacity: 0.7;
      }
      50% {
        transform: scale(1.05);
        opacity: 1;
      }
    }

    @keyframes glimmer {
      0%,
      100% {
        opacity: 0.82;
        box-shadow:
          0 0 14px rgba(255, 230, 160, 0.72),
          0 0 34px rgba(255, 217, 122, 0.42),
          0 0 76px rgba(126, 175, 255, 0.28);
      }
      50% {
        opacity: 1;
        box-shadow:
          0 0 18px rgba(255, 230, 160, 0.95),
          0 0 44px rgba(255, 217, 122, 0.6),
          0 0 88px rgba(126, 175, 255, 0.34);
      }
    }

    @media (max-width: 640px) {
      main {
        gap: 1.35rem;
      }

      .starfield {
        width: min(48vw, 10rem);
      }
    }
  </style>
</head>
<body>
 <main>
  <div class="starfield" aria-hidden="true">
    <div class="halo"></div>
    <div class="star"></div>
  </div>

  <h1>Solvinter</h1>

  <nav class="portal">
    <a href="https://anomalierna.solvinter.io">Anomalierna</a>
    <a href="/edge.html">Edge</a>
    <a href="https://github.com/solvinter">GitHub</a>
    </nav>
</main>
</body>
</html>
